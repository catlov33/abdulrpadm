<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Глобалы — расписание</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./site-config.js"></script>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div>
          <h1>Расписание пингов глобалов</h1>
          <p class="sub">Доступ: Гл. и Ст. ивентологи. Сохранение сразу в бота.</p>
        </div>
        <div class="auth" id="auth-bar">
          <span id="auth-user" class="auth-user muted"></span>
          <button type="button" class="btn sm" id="btn-discord-login">Войти через Discord</button>
          <button type="button" class="btn sm hidden" id="btn-logout">Выйти</button>
        </div>
      </header>

      <div id="gate" class="gate hidden">
        <p id="gate-msg"></p>
        <p class="muted small">Redirect в Discord Developer Portal: <code id="redirect-hint"></code></p>
      </div>

      <main id="app-main" class="hidden">
        <section class="panel tight">
          <div class="row-flex">
            <label class="inline">Часовой пояс <input type="text" id="default-tz" value="Europe/Moscow" /></label>
            <button type="button" class="btn primary" id="btn-save-bot">Сохранить в бота</button>
          </div>
          <p id="save-status" class="status-line"></p>
        </section>

        <section class="panel tight">
          <h2 class="panel-title">Роли</h2>
          <input type="search" id="role-search" placeholder="Поиск роли…" autocomplete="off" />
          <p id="roles-status" class="status-line muted"></p>
          <div id="role-list" class="role-list"></div>
          <div id="selected-chips" class="chips"></div>
        </section>

        <section class="panel tight">
          <h2 class="panel-title">Строки</h2>
          <div id="reminders-host"></div>
          <button type="button" class="btn" id="btn-add-row">+ Строка</button>
        </section>

        <section class="panel tight muted small">
          <p>Файл: <label class="linklike"><input type="file" id="btn-import-file" accept="application/json,.json" class="hidden" /> импорт JSON</label>
          · экспорт <button type="button" class="btn link" id="btn-export-file">скачать</button></p>
          <p id="export-status" class="status-line"></p>
        </section>
      </main>

      <footer class="foot muted small">Edge Of Darkness · bot_2 · OAuth identify</footer>
    </div>
    <script src="./app.js" defer></script>
  </body>
</html>
